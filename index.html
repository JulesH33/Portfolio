<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Simulation de crue</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
#map {
height: 600px;
width: 100%;
}
</style>

</head>

<body>

<h1>Simulation de crue</h1>

<p>
Simulation de l'étendue d'une crue pour une hauteur d'eau de 9.86 m.
Les données ont été traitées sous QGIS puis exportées en GeoJSON.
</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([45, 1], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

fetch("crue_lr_2026.geojson")
.then(response => response.json())
.then(data => {
L.geoJSON(data, {
onEachFeature: function(feature, layer) {
layer.bindPopup("Hauteur de crue : 9.86 m");
}
}).addTo(map);;
});

</script>

</body>
</html>
